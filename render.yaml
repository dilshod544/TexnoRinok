services:
  - type: web
    name: texnorinok
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn techshop.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: techshop.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: texnorinok-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: texnorinok.onrender.com

databases:
  - name: texnorinok-db
    databaseName: texnorinok
    user: admin
    plan: free
